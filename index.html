<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Badminton Log → Scorius</title>
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="refresh" content="0; url=https://scorius.app">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #07070a; color: #f5f5f7;
      text-align: center; padding: 24px;
    }
    .card { max-width: 420px; }
    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 12px; }
    p { color: #8e8e93; line-height: 1.5; }
    a { color: #38b8f0; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .dot {
      display: inline-block; width: 10px; height: 10px; border-radius: 50%;
      background: linear-gradient(135deg, #ff5a4a, #38b8f0, #ee5dab);
      margin-right: 8px; vertical-align: middle;
    }
    .loader { margin-top: 24px; }
    .loader span {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: #8e8e93; margin: 0 4px; animation: bounce 1.2s infinite;
    }
    .loader span:nth-child(2) { animation-delay: 0.2s; }
    .loader span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-8px); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1><span class="dot"></span>Badminton Log → Scorius</h1>
    <p>Aplikace se přejmenovala na <strong>Scorius</strong> a přesunula se na <a href="https://scorius.app">scorius.app</a>.</p>
    <p style="margin-top: 8px;">Přesměrovávám…</p>
    <div class="loader"><span></span><span></span><span></span></div>
  </div>
</body>
</html>
